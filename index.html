    <meta charset="utf-8" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003527",
                        "secondary": "#006c49",
                        "secondary-container": "#6cf8bb",
                        "background": "#f8f9ff",
                        "on-background": "#121c2a",
                        "surface-container-highest": "#d9e3f6",
                        "outline-variant": "#bfc9c3",
                        "on-surface-variant": "#404944",
                    },
                    fontFamily: {
                        "headline": ["Lora", "serif"],
                        "body": ["Public Sans", "sans-serif"],
                    }
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .step-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type="radio"]:checked + div { border-color: #006c49; background-color: rgba(108, 248, 187, 0.1); }
        input[type="radio"]:checked + div .check-dot { transform: scale(1); }

        /* PHASE 1: Loading Screen */
        @keyframes spinner { to { transform: rotate(360deg); } }
        .loading-spin { animation: spinner 0.8s linear infinite; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        .phase-1-container { animation: fadeOut 0.5s ease forwards 1.5s; }

        /* PHASE 2: Main Card Reveal */
        @keyframes cardReveal { to { opacity: 1; transform: scale(1); } }
        .reveal-card {
            opacity: 0;
            transform: scale(0.9);
            animation: cardReveal 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 1.5s;
        }

        /* PHASE 3: Content Animations */
        @keyframes shieldReveal {
            0%   { transform: scale(0) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        @keyframes shimmer {
            0%   { filter: brightness(1); }
            50%  { filter: brightness(1.3) drop-shadow(0 0 10px rgba(108, 248, 187, 0.4)); }
            100% { filter: brightness(1); }
        }
        .shield-shimmer {
            animation: shieldReveal 0.7s ease-out forwards 2s, shimmer 2s linear infinite 3s;
        }

        /* Logic Fix: Marker now uses JS-driven transition for reliable positioning */
        .gauge-marker {
            left: 0%;
            transition: left 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition-delay: 2.2s;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(108, 248, 187, 0.4); }
            70%  { box-shadow: 0 0 0 15px rgba(108, 248, 187, 0); }
            100% { box-shadow: 0 0 0 0 rgba(108, 248, 187, 0); }
        }
        .pulse-halo { animation: pulse 2s infinite 3.5s; }

        @keyframes staggerIn { to { opacity: 1; transform: translateY(0); } }
        .stagger-item { opacity: 0; transform: translateY(10px); }
        .stagger-1 { animation: staggerIn 0.5s ease forwards 2.4s; }
        .stagger-2 { animation: staggerIn 0.5s ease forwards 2.5s; }
        .stagger-3 { animation: staggerIn 0.5s ease forwards 2.6s; }
        .stagger-4 { animation: staggerIn 0.5s ease forwards 2.7s; }

        /* PHASE 4: CTA Button */
        @keyframes buttonPulse {
            0%   { box-shadow: 0 0 0 0 rgba(6, 78, 59, 0.4); }
            50%  { box-shadow: 0 0 20px 2px rgba(108, 248, 187, 0.3); }
            100% { box-shadow: 0 0 0 0 rgba(6, 78, 59, 0.4); }
        }
        .neon-pulse { animation: buttonPulse 2.5s infinite 4s; }

        /* Confetti */
        @keyframes confettiFall {
            0%   { transform: translateY(-50px) rotate(0); opacity: 1; }
            100% { transform: translateY(500px) rotate(720deg); opacity: 0; }
        }
        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            top: -20px;
            z-index: 100;
            animation: confettiFall 3s ease-out forwards;
        }

        @media print {
            header, #progress-container, #disclaimer-box, footer, button, .no-print, #loading-overlay, #confetti-container { display: none !important; }
            body { background: white; }
            .glass-card { 
                border: 1px solid #eee !important; 
                box-shadow: none !important;
                background: white !important;
                backdrop-filter: none !important;
                opacity: 1 !important;
                transform: none !important;
            }
            .stagger-item { opacity: 1 !important; transform: none !important; }
            main { padding: 0; max-width: 100%; margin-top: 0; }
            #results-container { display: block !important; opacity: 1 !important; }
        }
    </style>
</head>

            document.getElementById('reset-btn').innerText = t.restart;
            document.getElementById('calculating-text').innerText = t.calculating;
        }

            const t = content[currentLang];
            const wrapper = document.getElementById('question-wrapper');
            const progressLabel = document.getElementById('progress-label');
            const progressPercent = document.getElementById('progress-percent');
            const progressBar = document.getElementById('progress-bar');
            if (currentStep >= 8) return;
            const qData = t.questions[currentStep];
            const progress = ((currentStep + 1) / 8) * 100;
            progressLabel.innerText = `${t.progLabel} ${currentStep + 1} ${t.progOf} 8`;
            progressPercent.innerText = `${progress.toFixed(0)}%`;
            progressBar.style.width = `${progress}%`;
            
            wrapper.innerHTML = `
                <div class="glass-card border border-outline-variant/40 rounded-3xl p-8 shadow-xl step-transition translate-y-0 opacity-100">
                    <div class="mb-8"><span class="text-[10px] font-bold text-secondary bg-secondary-container px-3 py-1 rounded-md uppercase tracking-widest">${qData.cat}</span><h2 class="font-headline text-2xl text-on-surface leading-tight mt-4">${qData.q}</h2></div>
                    <div class="space-y-3">
                        ${qData.options.map((opt) => `
                            <label class="group relative flex items-center p-4 border border-outline-variant/50 rounded-2xl cursor-pointer hover:border-secondary transition-all duration-200">
                                <input class="sr-only" type="radio" name="step_option" value="${opt.pts}" onchange="handleSelect(${opt.pts})">
                                <div class="w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center mr-4 transition-all">
                                    <div class="w-2.5 h-2.5 bg-secondary rounded-full scale-0 transition-transform duration-200 check-dot"></div>
                                </div>
                                <span class="text-sm font-medium text-on-surface-variant group-hover:text-primary">${opt.text}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function handleSelect(points) {
            scores[currentStep] = points;
            setTimeout(() => {
                currentStep++;
                if (currentStep < 8) renderStep(); else showResults();
            }, 400);
        }

        function spawnConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#006c49', '#6cf8bb', '#003527', '#ffd700', '#ffffff'];
            for (let i = 0; i < 60; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 2 + 's';
                piece.style.width = (Math.random() * 8 + 4) + 'px';
                piece.style.height = piece.style.width;
                container.appendChild(piece);
            }
        }

        function showResults() {
            const t = content[currentLang];
            const totalScore = scores.reduce((a, b) => a + b, 0);
            const profile = t.profiles.find(p => totalScore >= p.range[0] && totalScore <= p.range[1]) || t.profiles[t.profiles.length-1];
            
            // Fixed positioning logic: reset first then apply new position
            const ptr = document.getElementById('gauge-ptr');
            ptr.style.left = "0%"; 

            document.getElementById('question-wrapper').classList.add('hidden');
            document.getElementById('progress-container').classList.add('opacity-0', 'pointer-events-none');
            
            const results = document.getElementById('results-container');
            results.classList.remove('hidden');

            // Set final position after short delay to trigger transition
            setTimeout(() => {
                const gaugePercent = ((totalScore - 8) / (40 - 8)) * 100;
                ptr.style.left = `${gaugePercent}%`;
            }, 100);

            setTimeout(spawnConfetti, 1500);

            document.getElementById('result-title').innerText = profile.title;
            document.getElementById('result-desc').innerText = profile.desc;
            document.getElementById('result-icon').className = `ph ${profile.icon} text-secondary text-3xl`;
            document.getElementById('instruments-list').innerHTML = profile.instruments.map(item => `<li class="flex items-center gap-2"><i class="ph ph-check-circle text-secondary"></i> ${item}</li>`).join('');
            document.getElementById('advice-text').innerText = profile.advice;
        }

        function resetAssessment() {
            currentStep = 0; scores = [];
            document.getElementById('confetti-container').innerHTML = '';
            document.getElementById('question-wrapper').classList.remove('hidden');
            document.getElementById('results-container').classList.add('hidden');
            document.getElementById('progress-container').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('gauge-ptr').style.left = "0%";
            renderStep();
        }
        window.onload = init;
    </script>
</body>
</html>
